<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ประวัติการสแกน</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 20px;
}

h1{
    text-align: center;
}

table{
    width: 100%;
    border-collapse: collapse;
    background: #1e293b;
}

th, td{
    padding: 12px;
    text-align: center;
    border: 1px solid #334155;
}

th{
    background: #0ea5e9;
}

tr:hover{
    background: #334155;
}

img{
    width: 120px;
    border-radius: 10px;
}

.btn{
    display: inline-block;
    margin-top: 20px;
    padding: 10px 20px;
    background: #22c55e;
    color: white;
    text-decoration: none;
    border-radius: 10px;
}

.center{
    text-align: center;
}

</style>

</head>
<body>

<h1>📋 ประวัติการสแกนใบหน้า</h1>

<table>

<thead>
<tr>
    <th>รูปภาพ</th>
    <th>ชื่อ</th>
    <th>สถานะ</th>
    <th>เหตุผล</th>
    <th>เวลา</th>
</tr>
</thead>

<tbody>

{% for row in history %}

<tr>

<td>
    <img src="{{ url_for('static', filename=row['Image']) }}">
</td>

<td>{{ row['Name'] }}</td>

<td>{{ row['Role'] }}</td>

<td>{{ row['Reason'] }}</td>

<td>{{ row['Scan Time'] }}</td>


</tr>

{% endfor %}

</tbody>

</table>



</body>
</html>
