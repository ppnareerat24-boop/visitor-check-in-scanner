<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">

<title>Face Scanner</title>

<style>

body{
    background:#111827;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:20px;
}

.video{
    margin-top:20px;
}

img{
    border-radius:20px;
    border:3px solid #00ff88;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}



</style>

</head>
<body>

<h1>📸 ระบบสแกนใบหน้า</h1>

    <div class="video">
        <img src="{{ url_for('video') }}" width="700">
    </div>

    

    <script >

        setInterval(function(){

            fetch("/capture_status")

            .then(response => response.text())

            .then(data=>{

                if(data=="done"){

                    window.location="/register";

                }

            });

        },500);

    </script>

</body>
</html>
